<app-smartphone-card>

    <p-table 
        [value]="projectMembers" 
        [scrollable]="true" 
        scrollHeight="550px" 
        [tableStyle]="{'min-width': '17rem', 'max-height': '550px', 'overflow-y': 'auto'}"
    >
        <ng-template pTemplate="header">
            <tr>
                <th>Name</th>
                <th>Delete</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-member>
            <tr>
                <td>{{ member.name }}</td>
                <td>
                    <p-button 
                        icon="pi pi-times" 
                        [rounded]="true" 
                        severity="danger" 
                        (click)="deleteUser(member.id)" 
                    />
                </td>
            </tr>
        </ng-template>
    </p-table>

    <div class="footer-container">
        <button class="footer-button" (click)="goHome()">
            <span class="pi pi-home"></span>
        </button>
        <button class="footer-button" (click)="goBack()">
            <span class="pi pi-arrow-left"></span>
        </button>   
    </div>

</app-smartphone-card>
