<app-smartphone-card>
  <form class="form">
    <p class="form-title">Sign in to your account</p>
    <div class="input-container">
      <input type="email" placeholder="Enter email" value="alice@example.com" />
    </div>
    <div class="input-container">
      <input type="password" placeholder="Enter password" value="hashed_password_" />
    </div>
    <button type="submit" class="submit" (click)="signIn()">Sign in</button>

    <p class="signup-link">
      No account?
      <a href="">Sign up</a>
    </p>
  </form>
</app-smartphone-card>
