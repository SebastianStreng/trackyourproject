<app-dialog-card>

    <div class="header-container">
        <h2 class="card-header">Assign to Project</h2>
        <button class="close-button" (click)="closeDialog()">&times;</button>
    </div>

    <p-table 
    [value]="projects" 
    [scrollable]="true" 
    [style]="{ width: '100%', minHeight: '480px', maxHeight: '480px' }" 
    scrollHeight="480px">
    <ng-template pTemplate="header">
        <tr>
            <th>Name</th>
            <th>Check</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-project>
        <tr>
            <td>{{ project?.name }}</td>
            <td>
                <p-checkbox 
                    [ngModel]="isSelected(project)" 
                    (ngModelChange)="toggleProjectSelection(project, $event)" 
                    binary="true">
                </p-checkbox>
            </td>
        </tr>
    </ng-template>
</p-table>


    <div class="footer-container">
        <button class="footer-button" (click)="goHome()"><span class="pi pi-home"></span></button>
        <button class="footer-button" (click)="goBack()"><span class="pi pi-arrow-left"></span></button>
      </div>
</app-dialog-card>>
