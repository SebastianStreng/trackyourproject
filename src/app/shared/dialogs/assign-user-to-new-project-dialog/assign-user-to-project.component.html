<app-dialog-card>

    <div class="header-container">
        <h2 class="card-header">Assign User to Project</h2>
        <button class="close-button" (click)="closeDialog()">&times;</button>
    </div>

    Project: {{project.name}}

    <p-table 
        [value]="users" 
        [scrollable]="true" 
        [style]="{ width: '100%', minHeight: '470px', maxHeight: '470px' }" 
        scrollHeight="470px">
        
        <ng-template pTemplate="header">
            <tr>
                <th>Name</th>
                <th>Check</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-user>
            <tr>
                <td>{{ user?.name }}</td>
                <td>
                    <p-checkbox 
                        [ngModel]="isSelected(user)" 
                        (ngModelChange)="toggleUserSelection(user, $event)" 
                        binary="true">
                    </p-checkbox>
                </td>
            </tr>
        </ng-template>
    </p-table>

    <div class="footer-container">
        <button class="footer-button" (click)="goHome()"><span class="pi pi-home"></span></button>
        <button class="footer-button" (click)="goHome()"><span class="pi pi-trash"></span></button>
        <button class="footer-button" (click)="updateUsers()"><span class="pi pi-check"></span></button>
        <button class="footer-button" (click)="goBack()"><span class="pi pi-arrow-left"></span></button>
    </div>

</app-dialog-card>
