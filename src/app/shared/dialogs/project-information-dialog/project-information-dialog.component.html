<app-dialog-card>
  <!-- Header mit Schließen-Button -->
  <div class="header-container">
    <h2 class="card-header">{{ project?.name || 'No Project Selected' }}</h2>
    <button class="close-button" (click)="closeDialog()">&times;</button>
  </div>

  <!-- Gruppen-Container -->
  <div class="group-container">
    <div class="group">
      <input id="tasksCount" required type="text" class="input" 
             [value]="project?.tasks?.length ?? 0" readonly>
      <label for="tasksCount">Number of Tasks</label>
    </div>

    <div class="group">
      <input id="membersCount" required type="text" class="input" 
             [value]="project?.members?.length ?? 0" readonly>
      <label for="membersCount">Number of Members</label>
    </div>

    <div class="group">
      <textarea id="description" required class="input" 
                [(ngModel)]="projectDescription"></textarea>
      <label for="description">Description</label>
    </div>
  </div>

  <!-- Tabelle mit Tasks -->
  <p-table 
    [value]="project?.tasks ?? []" 
    [scrollable]="true" 
    [style]="{ width: '100%', minHeight: '200px', maxHeight: '470px' }" 
    scrollHeight="250px">
    
    <ng-template pTemplate="header">
      <tr>
        <th>Tasks</th>
        <th>Assigned to</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-task>
      <tr>
        <td>
          <button pButton type="button">{{ task?.title || 'No Title' }}</button>
        </td>
        <td>
          {{ getAssignedTo(task) }}
        </td>
      </tr>
    </ng-template>

  </p-table>

  <!-- Footer mit Home- und Zurück-Button -->
  <div class="footer-container">
    <button class="footer-button" (click)="goHome()"><span class="pi pi-home"></span></button>
    <button class="footer-button" (click)="goBack()"><span class="pi pi-arrow-left"></span></button>
  </div>
</app-dialog-card>
