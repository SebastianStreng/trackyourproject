<app-dialog-card>
  <div class="header-container">
    <h2 class="card-header">{{ project?.name }}</h2>
    <button class="close-button" (click)="closeDialog()">&times;</button>
  </div>

  <div class="group-container">
    <div class="group">
      <input id="tasksCount" required type="text" class="input" [value]="projectTasks.length" readonly>
      <label for="tasksCount">Number of Tasks</label>
    </div>

    <div class="group">
      <input id="membersCount" required type="text" class="input" [value]="project?.members?.length ?? 0" readonly>
      <label for="membersCount">Number of Members</label>
    </div>

    <div class="group">
      <textarea id="description" required class="input" [(ngModel)]="projectDescription"></textarea>
      <label for="description">Description</label>
    </div>
  </div>

  <p-table 
    [value]="projectTasks" 
    [scrollable]="true" 
    [style]="{ width: '100%', minHeight: '250px', maxHeight: '470px' }" 
    scrollHeight="250px">
    <ng-template pTemplate="header">
      <tr>
        <th>Tasks</th>
        <th>Assigned to</th>
        <th>Status</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-task>
      <tr>
        <td>
          <button pButton (click)="addTask(task)" type="button">{{ task?.title }}</button>
        </td>
        <td>
          {{ getAssignedTo(task) }}
        </td>
        <td>
          {{ getTaskStatus(task) }}
        </td>
      </tr>
    </ng-template>
  </p-table>

  <div class="footer-container">
    <button class="footer-button" (click)="goHome()"><span class="pi pi-home"></span></button>
    <button class="footer-button" (click)="addTask()"><span class="pi pi-plus"></span></button>
    <button class="footer-button" (click)="addTask()"><span class="pi pi-user"></span></button>
    <button class="footer-button" (click)="goBack()"><span class="pi pi-arrow-left"></span></button>
  </div>
</app-dialog-card>
